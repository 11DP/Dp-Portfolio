       .school{

            padding: 30px;

            /* border: 20px solid rgb(245, 230, 13); */
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;

        }
        .school::before{
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #f0f0f0;
            clip-path:polygon(0 0,50% 100%,100% 0) ;
            border-bottom: 1px solid #d1d1d1;
            z-index: 1;
        }

            /* border-color: #00d4ff; */
