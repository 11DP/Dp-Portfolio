<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            padding-top: 120px;
        }
    .navigator {
  display: flex;
  zoom: 0.8;
  z-index: 1000;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100px;
  background:linear-gradient(red,blue);
  align-items: center;
  background: white;
  justify-content: center;
  padding-top: 20px;
}
        .nav {
        display: flex;
        gap: 5rem;
        list-style: none;
        
        }
        .nav a {
            color: black;
            text-decoration: double;
            font-weight: bold;
            font-size: 30px;
            
        }
        .main{
            margin: 0;
            border: 0;
            height: 100vh;
            width: 100%;
            background:linear-gradient(155deg,#0f172a 0%,#1e293b 100%) ;
            position: fixed;
        }
        .contact{
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            margin: 50px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            padding-top: 20px;
        }
        .contact-form input,.contact-form textarea{
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            padding-top: 20px;
        }
        .btn{
            background: linear-gradient(135deg,aqua,red);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover{
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(212,20,20,0.4);
        }
        .logout-btn{
            background: linear-gradient(goldenrod,black);
            color: white;
            padding:8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 40px;
            transition: 0.3s;
           
        }
        .logout-btn:hover{
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(212,20,20,0.5);
        }
        
        
        </style>
</head>
<body>
    <div class="navigator">
            <div class="nav">
            <a href="./phome.html">Home</a>
            <a href="./peducation.html">Journey</a>
            <a href="./pproject.html">Projects</a>
            <a href="./pcontact.html">Contact</a>
            <button id="logout" class="logout-btn">logout</button>
            </div>
    </div>
    <div class="main">
        <div class="contact">
            <h1>Get in touch!</h1>
            <p>Feel Free to reach out to talk about   an opportunity or just a friendly hello</p>
            <form action="#" class="contact-form">
                <input type="text" placeholder="Durga Prashanth N">
                <input type="email" placeholder="dpdn1104@gmail.com">
                <textarea placeholder="Your Message" rows="5"></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
            <div class="social-media">
                <a href="http://linkedin.com/in/durga-prashanth-n">Linkedin</a>
            </div>

        </div>

    </div>
    <script src="./logout.js"></script>
</body>
</html>
